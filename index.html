    /* ── BlankInput ── */
    function BlankInput({ blank, value, onChange, submitted, isOpen, attempts }) {
      const isCorrect = value.trim().toLowerCase() === blank.word.toLowerCase();
      let borderColor = "#ddd8d0";
      if (submitted) borderColor = isCorrect ? "#7a9e7a" : "#c08070";

      const getHint = () => {
        if (attempts < 3) return null;
        const w = blank.word;
        if (attempts < 4) return `Starts with "${w[0].toUpperCase()}", ${w.length} letters`;
        if (attempts < 5) {
          const half = w.slice(0, Math.ceil(w.length / 2));
          return half + "·".repeat(w.length - half.length);
        }
        return `Answer: ${w}`;
      };
      const hint = getHint();

      const sharedStyle = {
        background: submitted ? (isCorrect ? "#f2f6f2" : "#faf2f0") : "#f8f7f4",
        border: `1.5px solid ${borderColor}`,
        color: "#3a3632",
        padding: "8px 12px",
        borderRadius: 3,
        fontSize: 14,
        fontFamily: "'Crimson Pro', Georgia, serif",
        width: "100%",
        outline: "none",
        transition: "border-color 0.2s",
        boxSizing: "border-box",
      };

      return (
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: "#9e9890", marginBottom: 4, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 0.3 }}>
            {blank.hint}
          </div>

          {isOpen ? (
            <input
              type="text" value={value} onChange={e => onChange(e.target.value)}
              placeholder="type your answer…"
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
              style={sharedStyle}
            />
          ) : (
            <select value={value} onChange={e => onChange(e.target.value)}
              style={{ ...sharedStyle, cursor: "pointer", appearance: "auto" }}>
              <option value="">—</option>
              {blank.options.map((o, i) => <option key={i} value={o}>{o}</option>)}
            </select>
          )}

          {hint && !submitted && (
            <div style={{ fontSize: 11, color: "#b8923c", marginTop: 4, fontFamily: "'IBM Plex Mono', monospace" }}>
              💡 {hint}
            </div>
          )}
          {submitted && !isCorrect && (
            <div style={{ fontSize: 11, color: "#c08070", marginTop: 3, fontFamily: "'IBM Plex Mono', monospace" }}>
              → {blank.word}
            </div>
          )}
        </div>
      );
    }

    /* ── SongCard ── */
    function SongCard({ song, index }) {
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [open, setOpen] = useState(false);
      const [attempts, setAttempts] = useState(0);

      const isOpen = song.difficulty !== "Beginner";
      const totalBlanks = song.lines.reduce((s, l) => s + l.blanks.length, 0);
      const correct = song.lines.reduce((s, l, li) =>
        s + l.blanks.reduce((s2, b, bi) =>
          s2 + ((answers[`${li}-${bi}`] || "").trim().toLowerCase() === b.word.toLowerCase() ? 1 : 0), 0), 0);

      const handleCheck = () => {
        setSubmitted(true);
        if (isOpen && correct < totalBlanks) setAttempts(a => a + 1);
      };
      const handleRetry = () => {
        if (!isOpen) { setAnswers({}); setAttempts(0); }
        setSubmitted(false);
      };

      return (
        <div style={{ borderBottom: "1px solid #eae7e2" }}>
          {/* Header */}
          <div onClick={() => setOpen(!open)} style={{
            padding: "20px 0", cursor: "pointer", display: "flex",
            justifyContent: "space-between", alignItems: "baseline", userSelect: "none",
          }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 14 }}>
              <span style={{ fontSize: 11, color: "#c8c2ba", fontFamily: "'IBM Plex Mono', monospace", minWidth: 20 }}>
                {String(index + 1).padStart(2, "0")}
              </span>
              <div>
                <span style={{ fontSize: 18, fontFamily: "'Crimson Pro', Georgia, serif", fontWeight: 600, color: "#3a3632" }}>
                  {song.title}
                </span>
                <span style={{ fontSize: 14, color: "#9e9890", marginLeft: 12, fontStyle: "italic" }}>
                  {song.artist}
                </span>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{
                fontSize: 9, padding: "3px 8px", borderRadius: 2,
                color: song.difficulty === "Beginner" ? "#7a9e7a" : "#b8923c",
                border: `1px solid ${song.difficulty === "Beginner" ? "#7a9e7a30" : "#b8923c30"}`,
                fontFamily: "'IBM Plex Mono', monospace", textTransform: "uppercase", letterSpacing: 1.5,
              }}>{song.difficulty}</span>
              <span style={{
                color: "#c8c2ba", transform: open ? "rotate(90deg)" : "rotate(0)",
                transition: "transform 0.15s ease", display: "inline-block", fontSize: 16,
              }}>›</span>
            </div>
          </div>

          {/* Body */}
          {open && (
            <div style={{ paddingBottom: 32, paddingLeft: 34 }}>
              {/* Spotify embed */}
              <div style={{ marginBottom: 20 }}>
                <iframe
                  style={{ borderRadius: 12 }}
                  src={`https://open.spotify.com/embed/track/${song.spotifyId}?utm_source=generator`}
                  width="100%" height="152" frameBorder="0"
                  allowFullScreen=""
                  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                  loading="lazy"
                />
                <div style={{ fontSize: 12, color: "#c8c2ba", fontStyle: "italic", marginTop: 6 }}>{song.match}</div>
              </div>

              {/* Grammar & vocab */}
              <div style={{ marginBottom: 20, fontSize: 12, color: "#9e9890", lineHeight: 1.7 }}>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, textTransform: "uppercase", letterSpacing: 1.5, color: "#c8c2ba" }}>grammar </span>
                {song.grammar}
                <span style={{ margin: "0 12px", color: "#ddd8d0" }}>|</span>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, textTransform: "uppercase", letterSpacing: 1.5, color: "#c8c2ba" }}>vocab </span>
                {song.vocab.join(" · ")}
              </div>

              {isOpen && (
                <div style={{ marginBottom: 16, padding: "8px 12px", background: "#f0efec", borderRadius: 3, fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", color: "#9e9890", lineHeight: 1.6 }}>
                  Free-text mode — type your answers. Hints appear after 3 wrong checks.
                </div>
              )}

              {/* Lines */}
              {song.lines.map((line, li) => (
                <div key={li} style={{ marginBottom: 24, paddingLeft: 16, borderLeft: "2px solid #eae7e2" }}>
                  <div style={{ fontSize: 12, color: "#b5b0a8", marginBottom: 8, fontStyle: "italic", lineHeight: 1.6 }}>
                    {line.english}
                  </div>
                  <div style={{ fontSize: 16, color: "#5a5650", marginBottom: 12, fontFamily: "'Crimson Pro', Georgia, serif", lineHeight: 1.8, letterSpacing: 0.3 }}>
                    {(() => {
                      let text = line.italian; const parts = []; let lastIdx = 0;
                      line.blanks.forEach(b => {
                        const idx = text.indexOf(b.word, lastIdx);
                        if (idx >= 0) {
                          if (idx > lastIdx) parts.push({ type: "text", val: text.slice(lastIdx, idx) });
                          parts.push({ type: "blank" });
                          lastIdx = idx + b.word.length;
                        }
                      });
                      if (lastIdx < text.length) parts.push({ type: "text", val: text.slice(lastIdx) });
                      return parts.map((p, i) =>
                        p.type === "blank"
                          ? <span key={i} style={{ borderBottom: "2px solid #b8923c", padding: "0 6px", color: "#b8923c" }}>___</span>
                          : <span key={i}>{p.val}</span>
                      );
                    })()}
                  </div>
                  {line.blanks.map((blank, bi) => (
                    <BlankInput key={bi} blank={blank}
                      value={answers[`${li}-${bi}`] || ""}
                      onChange={val => setAnswers(p => ({ ...p, [`${li}-${bi}`]: val }))}
                      submitted={submitted} isOpen={isOpen} attempts={attempts}
                    />
                  ))}
                </div>
              ))}

              {/* Actions */}
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                {!submitted ? (
                  <button onClick={handleCheck} style={{
                    background: "#3a3632", color: "#f5f4f1", border: "none",
                    padding: "9px 24px", borderRadius: 3, fontSize: 11,
                    fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer",
                    textTransform: "uppercase", letterSpacing: 2,
                  }}>Check</button>
                ) : (
                  <>
                    <span style={{ fontSize: 13, fontFamily: "'IBM Plex Mono', monospace", color: correct === totalBlanks ? "#7a9e7a" : "#b8923c", fontWeight: 600 }}>
                      {correct}/{totalBlanks}{correct === totalBlanks ? " — perfetto!" : ""}
                    </span>
                    <button onClick={handleRetry} style={{
                      background: "none", color: "#9e9890", border: "1px solid #ddd8d0",
                      padding: "6px 16px", borderRadius: 3, fontSize: 11, cursor: "pointer",
                      fontFamily: "'IBM Plex Mono', monospace",
                    }}>{isOpen && correct < totalBlanks ? "Try again" : "Retry"}</button>
                    {isOpen && correct < totalBlanks && attempts > 0 && (
                      <span style={{ fontSize: 11, color: "#c8c2ba", fontFamily: "'IBM Plex Mono', monospace" }}>
                        attempt {attempts}/5
                      </span>
                    )}
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [plan, setPlan] = useState("A");
      const [showRef, setShowRef] = useState(false);
      const songs = plan === "A" ? SONGS.planA : SONGS.planB;

      return (
        <div style={{ maxWidth: 580, margin: "0 auto", padding: "56px 24px 72px" }}>
          <header style={{ marginBottom: 56 }}>
            <div style={{ fontSize: 9, fontFamily: "'IBM Plex Mono', monospace", textTransform: "uppercase", letterSpacing: 5, color: "#c8c2ba", marginBottom: 14 }}>
              Impara l'italiano con la musica
            </div>
            <h1 style={{ fontSize: 34, fontWeight: 300, margin: 0, lineHeight: 1.2, color: "#3a3632", letterSpacing: -0.5 }}>
              Italian Lyrics Lab
            </h1>
            <p style={{ fontSize: 15, color: "#9e9890", marginTop: 12, lineHeight: 1.7, fontStyle: "italic", fontWeight: 300 }}>
              Listen, fill in the blanks, learn conjugation and vocabulary through songs.
            </p>
          </header>

          <div style={{ display: "flex", gap: 0, marginBottom: 40, borderBottom: "1px solid #eae7e2" }}>
            {[{ key: "A", label: "Rock & Metal" }, { key: "B", label: "Classic & War Songs" }].map(({ key, label }) => (
              <button key={key} onClick={() => setPlan(key)} style={{
                background: "none", border: "none",
                borderBottom: plan === key ? "1.5px solid #3a3632" : "1.5px solid transparent",
                color: plan === key ? "#3a3632" : "#c8c2ba",
                padding: "10px 0", marginRight: 28, fontSize: 12,
                fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer",
                textTransform: "uppercase", letterSpacing: 2, transition: "all 0.2s",
              }}>{label}</button>
            ))}
          </div>

          <p style={{ fontSize: 14, color: "#9e9890", lineHeight: 1.8, marginBottom: 36, paddingBottom: 32, borderBottom: "1px solid #eae7e2" }}>
            {plan === "A"
              ? "Italian rock matched to your taste — Vasco Rossi, Måneskin, Toto Cutugno. Clear standard Italian, good for beginners."
              : "Songs from Italy's wars and post-war era. Partisan anthems, patriotic marches — all standard Italian, no dialects."}
          </p>

          {songs.map((song, i) => <SongCard key={song.id} song={song} index={i} />)}

          {/* Grammar ref */}
          <div style={{ marginTop: 48 }}>
            <button onClick={() => setShowRef(!showRef)} style={{
              background: "none", border: "none", color: "#c8c2ba", fontSize: 10,
              fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer",
              textTransform: "uppercase", letterSpacing: 2.5, padding: 0,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <span style={{ display: "inline-block", transform: showRef ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.15s" }}>›</span>
              Grammar Reference
            </button>
            {showRef && (
              <div style={{ marginTop: 20, fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#5a5650", lineHeight: 2.2 }}>
                {[
                  { label: "essere", content: "io sono · tu sei · lui/lei è · noi siamo · voi siete · loro sono" },
                  { label: "avere", content: "io ho · tu hai · lui/lei ha · noi abbiamo · voi avete · loro hanno" },
                  { label: "-are (cantare)", content: "io canto · tu canti · lui/lei canta · noi cantiamo · voi cantate · loro cantano" },
                  { label: "adjectives", content: "masc. sing: -o · fem. sing: -a · masc. pl: -i · fem. pl: -e" },
                  { label: "passato prossimo", content: "essere/avere (present) + past participle (-ato, -uto, -ito)" },
                ].map((r, i) => (
                  <div key={i} style={{ marginBottom: 10 }}>
                    <span style={{ color: "#c8c2ba", fontSize: 9, textTransform: "uppercase", letterSpacing: 1.5 }}>{r.label}</span><br />
                    {r.content}
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ marginTop: 56, paddingTop: 20, borderTop: "1px solid #eae7e2", fontSize: 10, color: "#ddd8d0", fontFamily: "'IBM Plex Mono', monospace", textAlign: "center", letterSpacing: 3 }}>
            in bocca al lupo
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
