    /* ── Render a lyric line with blanks inline ── */
    function LyricLine({ line, lineIdx, answers, onAnswer, submitted, isWarmup, isOpen }) {
      // Build parts: text or blank
      const parts = [];
      let text = line.italian;
      let lastIdx = 0;
      let blankNum = 0;

      line.blanks.forEach((b) => {
        const idx = text.indexOf(b.word, lastIdx);
        if (idx >= 0) {
          if (idx > lastIdx) parts.push({ type: "text", val: text.slice(lastIdx, idx) });
          parts.push({ type: "blank", blankIdx: blankNum, word: b.word });
          blankNum++;
          lastIdx = idx + b.word.length;
        }
      });
      if (lastIdx < text.length) parts.push({ type: "text", val: text.slice(lastIdx) });

      return (
        <div style={{ marginBottom: 28 }}>
          {/* English translation */}
          <div style={{ fontSize: 14, color: "#9e9890", marginBottom: 8, fontStyle: "italic" }}>
            {line.english}
          </div>

          {/* Italian lyric with inline blanks */}
          <div style={{ fontSize: 20, lineHeight: 2, color: "#2c2a26", marginBottom: 12, wordWrap: "break-word" }}>
            {parts.map((p, i) => {
              if (p.type === "text") return <span key={i}>{p.val}</span>;

              const key = `${lineIdx}-${p.blankIdx}`;
              const val = answers[key] || "";
              const correct = val.trim().toLowerCase() === p.word.toLowerCase();

              if (isWarmup) {
                return <span key={i} style={{ fontWeight: 600, color: "#5a8a5a" }}>{p.word}</span>;
              }

              if (submitted && correct) {
                return <span key={i} style={{ fontWeight: 600, color: "#5a8a5a" }}>{p.word}</span>;
              }
              if (submitted && !correct) {
                return <span key={i} style={{
                  fontWeight: 600, color: "#c47a6e",
                  borderBottom: "2px solid #c47a6e", paddingBottom: 1,
                }}>{p.word}</span>;
              }

              // Unfilled blank
              const width = Math.max(p.word.length * 11, 60);
              return (
                <span key={i} style={{
                  display: "inline-block",
                  borderBottom: "2px solid #b8923c",
                  width: Math.min(width, 180),
                  minWidth: 50,
                  textAlign: "center",
                  color: "#b8923c",
                  fontWeight: 600,
                  verticalAlign: "bottom",
                  margin: "0 2px",
                }}>{val || "\u00A0\u00A0\u00A0"}</span>
              );
            })}
          </div>

          {/* Input fields for this line (skip warmup) */}
          {!isWarmup && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
              {line.blanks.map((blank, bi) => {
                const key = `${lineIdx}-${bi}`;
                const val = answers[key] || "";
                const correct = val.trim().toLowerCase() === blank.word.toLowerCase();
                let border = "1.5px solid #d4d0c8";
                if (submitted) border = correct ? "1.5px solid #7a9e7a" : "1.5px solid #c47a6e";

                return (
                  <div key={bi} style={{ flex: "1 1 200px", minWidth: 150 }}>
                    <div style={{ fontSize: 12, color: "#9e9890", marginBottom: 3 }}>
                      {blank.hint}
                    </div>
                    {isOpen ? (
                      <input type="text" value={val}
                        onChange={e => onAnswer(key, e.target.value)}
                        placeholder="type answer…"
                        autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
                        style={{
                          background: submitted ? (correct ? "#f0f5f0" : "#faf0ee") : "#fff",
                          border, color: "#2c2a26", padding: "10px 12px", borderRadius: 4,
                          fontSize: 16, width: "100%", outline: "none",
                        }}
                      />
                    ) : (
                      <select value={val} onChange={e => onAnswer(key, e.target.value)}
                        style={{
                          background: submitted ? (correct ? "#f0f5f0" : "#faf0ee") : "#fff",
                          border, color: "#2c2a26", padding: "10px 12px", borderRadius: 4,
                          fontSize: 16, width: "100%", cursor: "pointer", outline: "none",
                          appearance: "auto",
                        }}>
                        <option value="">— select —</option>
                        {blank.options.map((o, oi) => <option key={oi} value={o}>{o}</option>)}
                      </select>
                    )}
                    {submitted && !correct && (
                      <div style={{ fontSize: 12, color: "#c47a6e", marginTop: 3 }}>→ {blank.word}</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ── SongCard ── */
    function SongCard({ song, index }) {
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [open, setOpen] = useState(false);
      const [attempts, setAttempts] = useState(0);

      const isOpen = song.difficulty !== "Beginner";
      const warmupCount = song.difficulty === "Beginner" ? 2 : 0;

      const exerciseLines = song.lines.slice(warmupCount);
      const totalBlanks = exerciseLines.reduce((s, l) => s + l.blanks.length, 0);
      const correct = exerciseLines.reduce((s, l, li) =>
        s + l.blanks.reduce((s2, b, bi) =>
          s2 + ((answers[`${li + warmupCount}-${bi}`] || "").trim().toLowerCase() === b.word.toLowerCase() ? 1 : 0), 0), 0);

      const getHint = () => {
        if (!isOpen || attempts < 3) return null;
        return attempts < 4 ? "First letter + word length shown in lyrics"
             : attempts < 5 ? "Half of each word revealed"
             : "Full answers shown";
      };

      const handleCheck = () => {
        setSubmitted(true);
        if (isOpen && correct < totalBlanks) setAttempts(a => a + 1);
      };
      const handleRetry = () => {
        if (!isOpen) { setAnswers({}); setAttempts(0); }
        setSubmitted(false);
      };

      return (
        <div style={{ borderBottom: "1px solid #e8e5df" }}>
          <div onClick={() => setOpen(!open)} style={{
            padding: "20px 0", cursor: "pointer", display: "flex",
            justifyContent: "space-between", alignItems: "center",
            userSelect: "none", flexWrap: "wrap", gap: 8,
          }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: "#c8c2ba", minWidth: 24 }}>
                {String(index + 1).padStart(2, "0")}
              </span>
              <span style={{ fontSize: 20, fontWeight: 600, color: "#2c2a26" }}>
                {song.title}
              </span>
              <span style={{ fontSize: 15, color: "#9e9890", fontStyle: "italic" }}>
                {song.artist}
              </span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{
                fontSize: 11, padding: "3px 10px", borderRadius: 3,
                color: song.difficulty === "Beginner" ? "#5a8a5a" : "#b8923c",
                border: `1px solid ${song.difficulty === "Beginner" ? "#5a8a5a33" : "#b8923c33"}`,
                textTransform: "uppercase", letterSpacing: 1,
              }}>{song.difficulty}</span>
              <span style={{
                color: "#c8c2ba", transform: open ? "rotate(90deg)" : "rotate(0)",
                transition: "transform 0.15s", display: "inline-block", fontSize: 18,
              }}>›</span>
            </div>
          </div>

          {open && (
            <div style={{ paddingBottom: 36, paddingLeft: 0 }}>
              {/* Spotify */}
              <div style={{ marginBottom: 24 }}>
                <iframe
                  style={{ borderRadius: 12 }}
                  src={`https://open.spotify.com/embed/track/${song.spotifyId}?utm_source=generator`}
                  width="100%" height="152" frameBorder="0" allowFullScreen=""
                  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                  loading="lazy"
                />
              </div>

              {/* Meta */}
              <div style={{ marginBottom: 16, fontSize: 14, color: "#9e9890" }}>
                <span style={{ color: "#b8923c", fontStyle: "italic" }}>{song.match}</span>
              </div>
              <div style={{ marginBottom: 24, fontSize: 14, color: "#9e9890", lineHeight: 1.8 }}>
                <strong style={{ color: "#2c2a26", fontWeight: 500, fontSize: 12, textTransform: "uppercase", letterSpacing: 1 }}>Grammar: </strong>
                {song.grammar}
                <span style={{ margin: "0 10px", color: "#d4d0c8" }}>|</span>
                <strong style={{ color: "#2c2a26", fontWeight: 500, fontSize: 12, textTransform: "uppercase", letterSpacing: 1 }}>Vocab: </strong>
                {song.vocab.join(", ")}
              </div>

              {/* Mode indicator */}
              <div style={{
                marginBottom: 24, padding: "10px 14px", background: "#efeee9",
                borderRadius: 4, fontSize: 14, color: "#6e6a62",
              }}>
                {song.difficulty === "Beginner"
                  ? "Beginner mode — first 2 lines completed as warm-up. Fill in the blanks using the dropdowns below."
                  : "Free-text mode — type your answers. Hints appear after 3 wrong attempts."}
              </div>

              {/* Hint for intermediate after attempts */}
              {getHint() && (
                <div style={{ marginBottom: 16, fontSize: 13, color: "#b8923c" }}>
                  💡 {getHint()}
                </div>
              )}

              {/* All lyrics */}
              {song.lines.map((line, li) => (
                <LyricLine key={li} line={line} lineIdx={li}
                  answers={answers} onAnswer={(k, v) => setAnswers(p => ({ ...p, [k]: v }))}
                  submitted={submitted}
                  isWarmup={li < warmupCount}
                  isOpen={isOpen}
                />
              ))}

              {/* Actions */}
              <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap", marginTop: 8 }}>
                {!submitted ? (
                  <button onClick={handleCheck} style={{
                    background: "#2c2a26", color: "#f5f4f1", border: "none",
                    padding: "12px 28px", borderRadius: 4, fontSize: 14,
                    cursor: "pointer", textTransform: "uppercase", letterSpacing: 1.5,
                  }}>Check</button>
                ) : (
                  <>
                    <span style={{
                      fontSize: 16, fontWeight: 600,
                      color: correct === totalBlanks ? "#5a8a5a" : "#b8923c",
                    }}>
                      {correct}/{totalBlanks}{correct === totalBlanks ? " — perfetto!" : ""}
                    </span>
                    <button onClick={handleRetry} style={{
                      background: "none", color: "#9e9890", border: "1px solid #d4d0c8",
                      padding: "10px 20px", borderRadius: 4, fontSize: 13, cursor: "pointer",
                    }}>{isOpen && correct < totalBlanks ? "Try again" : "Retry"}</button>
                    {isOpen && correct < totalBlanks && attempts > 0 && (
                      <span style={{ fontSize: 13, color: "#c8c2ba" }}>attempt {attempts}/5</span>
                    )}
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [plan, setPlan] = useState("A");
      const [showRef, setShowRef] = useState(false);
      const songs = plan === "A" ? SONGS.planA : SONGS.planB;

      return (
        <div style={{ maxWidth: 680, margin: "0 auto", padding: "40px 20px 80px" }}>
          <header style={{ marginBottom: 48 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 4, color: "#c8c2ba", marginBottom: 10 }}>
              Impara l'italiano con la musica
            </div>
            <h1 style={{ fontSize: 36, fontWeight: 300, margin: 0, lineHeight: 1.3, color: "#2c2a26" }}>
              Italian Lyrics Lab
            </h1>
            <p style={{ fontSize: 16, color: "#9e9890", marginTop: 12, lineHeight: 1.7, fontStyle: "italic" }}>
              Listen, fill in the blanks, learn conjugation and vocabulary through songs.
            </p>
          </header>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 0, marginBottom: 36, borderBottom: "1px solid #e8e5df", flexWrap: "wrap" }}>
            {[{ key: "A", label: "Rock & Metal" }, { key: "B", label: "Classic & War Songs" }].map(({ key, label }) => (
              <button key={key} onClick={() => setPlan(key)} style={{
                background: "none", border: "none",
                borderBottom: plan === key ? "2px solid #2c2a26" : "2px solid transparent",
                color: plan === key ? "#2c2a26" : "#c8c2ba",
                padding: "10px 0", marginRight: 24, fontSize: 14,
                cursor: "pointer", textTransform: "uppercase", letterSpacing: 1.5,
                transition: "all 0.2s", whiteSpace: "nowrap",
              }}>{label}</button>
            ))}
          </div>

          <p style={{ fontSize: 15, color: "#9e9890", lineHeight: 1.8, marginBottom: 32, paddingBottom: 28, borderBottom: "1px solid #e8e5df" }}>
            {plan === "A"
              ? "Italian rock matched to your taste — Vasco Rossi, Måneskin, Toto Cutugno. Clear standard Italian."
              : "Songs from Italy's wars and post-war era. Partisan anthems and national classics — standard Italian, no dialects."}
          </p>

          {songs.map((song, i) => <SongCard key={song.id} song={song} index={i} />)}

          {/* Grammar ref */}
          <div style={{ marginTop: 48 }}>
            <button onClick={() => setShowRef(!showRef)} style={{
              background: "none", border: "none", color: "#c8c2ba", fontSize: 12,
              cursor: "pointer", textTransform: "uppercase", letterSpacing: 2, padding: 0,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              <span style={{ display: "inline-block", transform: showRef ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.15s" }}>›</span>
              Grammar Reference
            </button>
            {showRef && (
              <div style={{ marginTop: 20, fontSize: 14, color: "#5a5650", lineHeight: 2.2 }}>
                {[
                  { label: "essere", content: "io sono · tu sei · lui/lei è · noi siamo · voi siete · loro sono" },
                  { label: "avere", content: "io ho · tu hai · lui/lei ha · noi abbiamo · voi avete · loro hanno" },
                  { label: "-are (cantare)", content: "io canto · tu canti · lui/lei canta · noi cantiamo · voi cantate · loro cantano" },
                  { label: "adjectives", content: "masc. sing: -o · fem. sing: -a · masc. pl: -i · fem. pl: -e" },
                  { label: "passato prossimo", content: "essere/avere (present) + past participle (-ato, -uto, -ito)" },
                ].map((r, i) => (
                  <div key={i} style={{ marginBottom: 12 }}>
                    <span style={{ color: "#c8c2ba", fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5 }}>{r.label}</span><br />
                    {r.content}
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{ marginTop: 56, paddingTop: 20, borderTop: "1px solid #e8e5df", fontSize: 12, color: "#ddd8d0", textAlign: "center", letterSpacing: 2 }}>
            in bocca al lupo
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
